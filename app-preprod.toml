[base]
# 最大启用线程数量
go_max_procs=3
# 模式
mode="dev"

[logger]
# 日志格式
format="text"
# 日志等级
level="debug"
# 日志的时间格式
time_format=""
# 被启用的HOOK
# if log_file_path == "", log will out put to stderr
log_file_path="logs/bw-user.log"
# hooks=[
#     ["Airbrake","123","xyz","production"],
#     ["Syslog","udp","localhost:514","info",""],
#     ["logstash","udp","localhost:9100","info",""],
#     ["SelfDefined","arg1","arg2","arg3"],
#     ["File",">=warn|fileline|server.error.log","<=info|server.info.log"]
# ]


[service]
# 监听地址
host=":8091"
# 路径前缀
path_prefix=""
# 服务错误码前缀，不包含调用错误和其他服务的错误
mcode_prefix="bw-user"

# 启用调用追踪
trace_enabled=true
# 打印接入日志
access_log_enabled=true

# 上报服务
reportable=true
# 上报服务IP
report_ip="${ip_of_interface,}"
# 上报服务标注
report_tags=[]
# 上报服务名称
report_name="bw-user"
# 上报服务ID
report_id="bw-user_8091"

# PPROF 启用
pprof_enabled = false
# PPROF 路径前缀
pprof_path_prefix=""

log_level="debug"
# if log_file_path=="", log will output to stderr
log_file_path="logs/access.log"
[mongo]
url="mongodb://brokerwork:o6RJzAF1LELzutEv@10.47.43.22:27017,10.47.36.173:27017,10.28.185.68:27017/brokerwork"
