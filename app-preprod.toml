[zipkin]
# 上报地址
url="${kv_of_consul,openapi/zipkin/url}"

[consul]
# 接口API地址
endpoint="127.0.0.1:8500"
# 定时同步服务地址（以免consul故障后注册服务消失）
auto_sync_enabled = true

[discovery]
# 启用consul作为服务发现
enable_consul = true
# 启用静态服务发现
enable_static = true
# 静态服务地址
static_services = [
]

[hystrix]
# 上报地址
statsd_url="${kv_of_consul,openapi/statsd/url}"

timeout=10000
max_concurrent_request=200
error_percent_threshold=20

default_timeout=10000
default_max_concurrent_request=200
default_error_percent_threshold=20

[invoker]
# 负载均衡策略
load_balance_mode = "round-robin"
# 启用调用追踪
tracing_enabled = true
# 启用熔断
hytrix_enabled = true
# 打印日志
do_logger = true

